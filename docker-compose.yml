version: '3.8'

services:
  api:
    build:
      context: .
      target: development
    container_name: bus_api
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bus_net

  redis:
    image: redis:alpine
    container_name: bus_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bus_net

networks:
  bus_net:
    driver: bridge